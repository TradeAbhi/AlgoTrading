# ============================================================
# Delta Exchange Alert Service Configuration
# ============================================================

delta:
  api:
    base-url: https://api.india.delta.exchange
    testnet: false
    testnet-url: https://testnet-api.delta.exchange
  symbols: BTCUSD,ETHUSD,SOLUSD,PAXGUSD,XRPUSD

alert:
  scheduler:
    cron: "0 0/15 * * * *"
  pdl:
    refresh:
      cron: "0 1 0 * * *"
  cooldown:
    minutes: 15

volume:
  scanner:
    spike-multiplier: 2.0    # volume >= 2x avg  → spike
    climax-multiplier: 3.0   # volume >= 3x avg + trending → climax

logging:
  level:
    com.trading.algo.delta: DEBUG
    okhttp3: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

