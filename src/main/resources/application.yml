# ============================================================
# Trading Bot Configuration - ORB & Watchlist Modules
# ============================================================

orb:
  instruments-csv-path: classpath:ind_nifty500list.csv

backtest:
  requests-per-second: 20
  thread-pool-size: 10
  max-c2-range-percent: 1.41  # Tighten to 1.0 for stricter narrow-range filter
  fixed-risk-rupees: 10000
  sl-margin-percent: 0.45
  # min-wick-ratio: 0.65

watchlist:
  # Limits per category
  top-gainers-limit: 20
  top-losers-limit: 20
  active-by-value-limit: 20
  high-oi-limit: 20
  volume-shocker-limit: 20
  only-buyers-limit: 20
  only-sellers-limit: 20

  # Thresholds and Logic
  volume-shocker-threshold: 3.0    # 3x avg volume = shocker
  only-buyers-ratio-threshold: 5.0 # buyQty >= 5x sellQty
  only-sellers-ratio-threshold: 5.0 # sellQty >= 5x buyQty

  # Liquidity Filters
  min-traded-value-crores: 5.0
  min-open-interest: 100000
  cache-ttl-seconds: 60
  segment: NSE_EQ

# ============================================================
# Spring Framework Infrastructure
# ============================================================

spring:
  application:
    name: AlgoTrading

  cache:
    type: caffeine
    cache-names:
      - instruments
      - quotes

  caffeine:
    spec: maximumSize=500,expireAfterWrite=65s

  task:
    scheduling:
      pool:
        size: 5  # Shared pool for ORB and existing schedulers

  # ===============================
  # MYSQL CONFIG
  # ===============================
  datasource:
    url: jdbc:mysql://localhost:3306/algotrading
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      maximum-pool-size: 10

  # ===============================
  # JPA / HIBERNATE
  # ===============================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
          batch_versioned_data: true

# ============================================================
# SERVER CONFIG
# ============================================================

server:
  port: 8080

